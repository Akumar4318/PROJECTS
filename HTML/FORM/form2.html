<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<body>
    <h2>Complex form</h2>

    <form >
       <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name">

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="xyz@gmail.com">

        <label for="phone">Phone:</label>
        <input type="tel" name="phone no." id="phone">

        <label for="dob">Date of birth:</label>
        <input type="date" id="dob">
        <label for="reset">Reset</label>
        <input type="reset" name="" id="reset">


           <label for="">Gender</label>
        <input type="radio" name="radio" id="radio3">
        <label for="radio3">Male</label>
        <input type="radio" name="radio" id="radio4">
        <label for="radio3">female</label>

        

        <br>

         <label for="country">Country</label>
        <select name="country" id="country">
            <option value="">India</option>
            <option value="">USA</option>
            <option value="">England</option>
            <option value="">China</option>
            <option value="">Japan</option>
        </select>
        
       </fieldset>
       <br>

       <fieldset>
        <legend>Addres Street
            <label for="street">Street</label>
       <input type="text" id="street">

       <label for="city">city</label>
       <input type="text" id="city">
  
       <label for="state">state</label>
       <input type="text" id="state">
       
       <label for="zipcode">zipcode:</label>
       <input type="text" name="zipcode" id="zipcode">
  
  

        </legend>
       </fieldset>
       <br>
       <fieldset>
        <legend>Other Information</legend>

        <label for="comments">Comments</label> <br>
       <textarea name="comments" id="comments" rows="5" cols="10"></textarea>
   

       <label for="terms">I agree to the terms</label>
       <input type="checkbox" name="terms" id="terms">

     <fieldset>
        <legend>Name</legend>
        <label for="radio1">aman</label>
        <input type="radio" name="radio" id="radio1">
        <br>
 
        <label for="radio2">abhishek</label>
        <input type="radio" name="radio" id="radio2">
        
     </fieldset>
       

       <br>
       <button>Submit</button>

       </fieldset>

    </form>

</body>
</html>
